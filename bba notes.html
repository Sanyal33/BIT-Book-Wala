	<style>
		.button {
		  position: relative;
		  background-color: rgb(99, 86, 187);
		  border: none;
		  font-size: 20px;
		  color: #FFFFFF;
		  padding: 2px;
		  width: 320px;
		  text-align: center;
		  -webkit-transition-duration: 0.4s; /* Safari */
		  transition-duration: 0.4s;
		  text-decoration: none;
		  overflow: hidden;
		  cursor: pointer;
		}
		
		.button:after {
		  content: "";
		  background: rgb(161, 146, 255);
		  display: block;
		  position: absolute;
		  padding-top: 300%;
		  padding-left: 350%;
		  margin-left: -20px!important;
		  margin-top: -120%;
		  opacity: 0;
		  transition: all 0.8s
		}
		
		.button:active:after {
		  padding: 0;
		  margin: 0;
		  opacity: 1;
		  transition: 0s
		}
			</style>
